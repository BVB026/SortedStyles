<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sortedstyles Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #D9D7CC; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #2C364C; 
        }
        
        .card {
            background: #E5E3D8; 
            padding: 40px 25px;
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(44, 54, 76, 0.08); 
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }
        
        .brand-logo-img {
            max-width: 220px; 
            height: auto;
            margin: 0 auto 10px auto;
            display: block;
            mix-blend-mode: multiply; 
        }

        p.subtitle {
            color: rgba(44, 54, 76, 0.7); 
            font-size: 15px;
            margin-bottom: 25px;
            font-weight: 400;
        }
        
        .email-display-box {
            background: #FFFFFF; 
            padding: 14px 20px;
            border-radius: 50px; 
            font-size: 16px;
            color: #2C364C; 
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(44, 54, 76, 0.04);
        }

        .email-display-box svg {
            width: 16px;
            height: 16px;
            opacity: 0.6;
        }
        
        .qr-container {
            background: #ffffff; 
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(44, 54, 76, 0.06); 
        }
        
        .qr-container img {
            display: block;
            width: 160px;
            height: 160px;
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: #2C364C; 
            color: #ffffff;
            border: none;
            border-radius: 50px; 
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(44, 54, 76, 0.15);
        }
        
        button:hover, button.clicked {
            background-color: #8CA082; 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(140, 160, 130, 0.3);
        }
        
        .trust-badge {
            margin-top: 25px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #8CA082; 
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* NEW: Instagram Link Styling */
        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #5A6A7D;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .social-link:hover {
            color: #8CA082; /* Highlights in Sage Green */
        }

        .social-link svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>

    <div class="card">
        
        <img src="logo.jpeg" alt="sortedstyles Logo" class="brand-logo-img">
        
        <p class="subtitle">Tap below to copy the transfer email.</p>
        
        <div class="email-display-box">
            Test@gmail.com
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 16.5V19.5A2.25 2.25 0 0113.5 21.5h-9a2.25 2.25 0 01-2.25-2.25v-9A2.25 2.25 0 014.5 8.5h3m8.25 0h-9m9 0V4.5A2.25 2.25 0 0115.75 2.25h9a2.25 2.25 0 012.25 2.25v9a2.25 2.25 0 01-2.25 2.25h-3m-9 0v9" />
            </svg>
        </div>

        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://styelsy.netlify.app/Nigel-etf" alt="Scan to open checkout page">
        </div>
        
        <button id="copyBtn" onclick="copyEmail('Test@gmail.com')">Copy Email Address</button>
        
        <div class="trust-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z" clip-rule="evenodd" />
            </svg>
            Auto-deposit enabled
        </div>

        <!-- NEW: Instagram Link -->
        <a href="https://www.instagram.com/sortedstyles/" target="_blank" class="social-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            Follow @sortedstyles
        </a>
    </div>

    <script>
        function copyEmail(email) {
            navigator.clipboard.writeText(email).then(() => {
                const btn = document.getElementById('copyBtn');
                
                btn.innerText = 'Copied! ✅';
                btn.classList.add('clicked');
                
                setTimeout(() => {
                    btn.innerText = 'Copy Email Address';
                    btn.classList.remove('clicked');
                }, 3000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
                alert("Please manually copy the email from the box above.");
            });
        }
    </script>

</body>
</html>
